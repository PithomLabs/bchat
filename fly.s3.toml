# fly.io configuration for bchat with LanceDB RAG support
# Storage: Tigrisdata S3 for LanceDB, fly volume for SQLite
#
# Usage:
#   cp fly.s3.toml fly.toml
#   fly deploy
#
# Required secrets:
#   fly storage create  # Creates bucket and sets AWS credentials
#   fly secrets set LANCEDB_S3_BUCKET=<bucket-name-from-storage-create>
#   fly secrets set OPENROUTER_API_KEY=sk-or-v1-xxx
#   fly secrets set ENCRYPTION_MASTER_KEY=$(uuidgen)
#
# Required volume:
#   fly volumes create memos_data --size 1 --region ord

app = "bchat"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.s3.fly"

[env]
  MEMOS_MODE = "prod"
  MEMOS_PORT = "5230"
  TZ = "UTC"

  # RAG Pipeline Configuration (Tigrisdata S3)
  RAG_PIPELINE_ENABLED = "true"
  LANCEDB_STORAGE_PROVIDER = "s3"
  LANCEDB_S3_ENDPOINT = "fly.storage.tigris.dev"
  LANCEDB_S3_REGION = "auto"
  EMBEDDING_PROVIDER = "openrouter"
  EMBEDDING_MODEL = "sentence-transformers/all-minilm-l12-v2"
  LLM_VERIFIER_ENABLED = "false"

[http_service]
  internal_port = 5230
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "memos_data"
  destination = "/var/opt/memos"
