# fly.io configuration for bchat with LanceDB RAG support
# Storage: Local volume (SQLite + LanceDB on same fly volume)
#
# Usage:
#   cp fly.local.toml fly.toml
#   fly deploy
#
# Required secrets:
#   fly secrets set OPENROUTER_API_KEY=sk-or-v1-xxx
#   fly secrets set ENCRYPTION_MASTER_KEY=$(uuidgen)
#
# Required volume:
#   fly volumes create memos_data --size 1 --region ord

app = "bchat"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.local.fly"

[env]
  MEMOS_MODE = "prod"
  MEMOS_PORT = "5230"
  TZ = "UTC"

  # RAG Pipeline Configuration (Local Storage)
  RAG_PIPELINE_ENABLED = "true"
  LANCEDB_STORAGE_PROVIDER = "local"
  LANCEDB_LOCAL_PATH = "/var/opt/memos/lancedb"
  EMBEDDING_PROVIDER = "openrouter"
  EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L12-v2"
  LLM_VERIFIER_ENABLED = "false"

  LLM_MODEL_REASONING = "openai/gpt-oss-120b:free"
  EMBEDDING_TIMEOUT = "10m"
  LLM_MODEL = "openai/gpt-oss-120b:free"
[http_service]
  internal_port = 5230
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "memos_data"
  destination = "/var/opt/memos"
