# fly.toml app configuration file generated for bchat0534 on 2026-02-27T15:21:59+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bchat'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile.local.fly'

[env]
  EMBEDDING_BATCH_SIZE = '10'
  EMBEDDING_MODEL = 'openai/text-embedding-3-small'
  EMBEDDING_PROVIDER = 'openrouter'
  EMBEDDING_TIMEOUT = '10m'
  LANCEDB_LOCAL_PATH = '/var/opt/memos/lancedb'
  LANCEDB_STORAGE_PROVIDER = 'local'
  LLM_MODEL = 'openai/gpt-oss-120b:free'
  LLM_MODEL_REASONING = 'nvidia/nemotron-3-super-120b-a12b:free'
  LLM_VERIFIER_ENABLED = 'false'
  MEMOS_MODE = 'prod'
  MEMOS_PORT = '5230'
  RAG_PIPELINE_ENABLED = 'true'
  TZ = 'UTC'

[[mounts]]
  source = 'memos_data'
  destination = '/var/opt/memos'

[http_service]
  internal_port = 5230
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
