version: '3'

vars:
  # LanceDB native library configuration
  LANCEDB_VERSION: v0.1.2
  PLATFORM:
    sh: go env GOOS
  ARCH:
    sh: go env GOARCH
  LANCEDB_LIB_DIR: "{{.ROOT_DIR}}/lib/{{.PLATFORM}}_{{.ARCH}}"

tasks:
  setup:
    desc: Install all dependencies
    cmds:
      - npm --prefix web install
      - go mod download

  setup:lancedb:
    desc: Download LanceDB native libraries (required for RAG pipeline)
    cmds:
      - mkdir -p lib include
      - |
        echo "Downloading LanceDB native libraries for {{.PLATFORM}}_{{.ARCH}}..."
        curl -sSL https://raw.githubusercontent.com/lancedb/lancedb-go/main/scripts/download-artifacts.sh | bash -s {{.LANCEDB_VERSION}}
    status:
      - test -f "{{.LANCEDB_LIB_DIR}}/liblancedb_go.a"

  build:frontend:
    desc: Build frontend assets
    cmds:
      - npm --prefix web run release

  build:backend:
    desc: Build the Go binary
    cmds:
      - mkdir -p build
      - go build -o build/memos ./bin/memos/main.go

  build:backend:rag:
    desc: Build the Go binary with LanceDB RAG support
    deps: [setup:lancedb]
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I{{.ROOT_DIR}}/include"
      CGO_LDFLAGS: "{{if eq .PLATFORM \"linux\"}}-L{{.LANCEDB_LIB_DIR}} -llancedb_go -Wl,-rpath,{{.LANCEDB_LIB_DIR}}{{else}}{{.LANCEDB_LIB_DIR}}/liblancedb_go.a{{end}} {{if eq .PLATFORM \"darwin\"}}-framework Security -framework CoreFoundation{{end}}"
    cmds:
      - mkdir -p build
      - go build -tags rag -o build/memos ./bin/memos/main.go

  build:widget:
    desc: Build the embeddable chat widget
    dir: widget
    cmds:
      - npm install
      - npm run build

  build:
    desc: Build everything (frontend + backend)
    deps: [build:frontend, build:backend]

  build:all:
    desc: Build everything including widget (frontend + backend + widget)
    deps: [build:frontend, build:backend, build:widget]

  build:rag:
    desc: Build everything with RAG support (frontend + backend with LanceDB)
    deps: [build:frontend, build:backend:rag]

  build:rag:all:
    desc: Build everything with RAG support including widget
    deps: [build:frontend, build:backend:rag, build:widget]

  dev:frontend:
    desc: Run frontend dev server
    cmds:
      - npm --prefix web run dev

  dev:backend:
    desc: Run backend dev server
    cmds:
      - go run ./bin/memos/main.go --mode dev

  dev:backend:rag:
    desc: Run backend dev server with RAG support (go run)
    deps: [setup:lancedb]
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I{{.ROOT_DIR}}/include"
      CGO_LDFLAGS: "{{if eq .PLATFORM \"linux\"}}-L{{.LANCEDB_LIB_DIR}} -llancedb_go -Wl,-rpath,{{.LANCEDB_LIB_DIR}}{{else}}{{.LANCEDB_LIB_DIR}}/liblancedb_go.a{{end}} {{if eq .PLATFORM \"darwin\"}}-framework Security -framework CoreFoundation{{end}}"
      LD_LIBRARY_PATH: "{{.LANCEDB_LIB_DIR}}:${LD_LIBRARY_PATH}"
      RAG_PIPELINE_ENABLED: "true"
      EMBEDDING_PROVIDER: "local"
    cmds:
      - go run -tags rag ./bin/memos/main.go --mode dev

  run:rag:
    desc: Run compiled binary with RAG enabled (local storage, OpenRouter embeddings)
    deps: [build:backend:rag]
    env:
      LD_LIBRARY_PATH: "{{.LANCEDB_LIB_DIR}}:${LD_LIBRARY_PATH}"
      RAG_PIPELINE_ENABLED: "true"
      LANCEDB_STORAGE_PROVIDER: "local"
      EMBEDDING_PROVIDER: "openrouter"
    cmds:
      - ./build/memos --mode dev --data {{.ROOT_DIR}}/build/data

  run:rag:mock:
    desc: Run compiled binary with RAG enabled (local storage, mock embeddings)
    deps: [build:backend:rag]
    env:
      LD_LIBRARY_PATH: "{{.LANCEDB_LIB_DIR}}:${LD_LIBRARY_PATH}"
      RAG_PIPELINE_ENABLED: "true"
      LANCEDB_STORAGE_PROVIDER: "local"
      EMBEDDING_PROVIDER: "mock"
    cmds:
      - ./build/memos --mode dev --data {{.ROOT_DIR}}/build/data

  generate:
    desc: Run go generate
    cmds:
      - go generate ./...

  embedding:server:
    desc: Run local embedding server (requires Python with sentence-transformers)
    dir: scripts
    cmds:
      - |
        if [ ! -f embedding_server.py ]; then
          echo "Creating embedding server script..."
          mkdir -p scripts
          cat > embedding_server.py << 'EOF'
        from fastapi import FastAPI
        from sentence_transformers import SentenceTransformer
        from pydantic import BaseModel
        import uvicorn

        app = FastAPI()
        model = SentenceTransformer('all-MiniLM-L6-v2')

        class EmbedRequest(BaseModel):
            texts: list[str]
            model: str = None

        @app.post("/embed")
        def embed(req: EmbedRequest):
            embeddings = model.encode(req.texts).tolist()
            return {"embeddings": embeddings, "model": "all-MiniLM-L6-v2"}

        if __name__ == "__main__":
            uvicorn.run(app, host="0.0.0.0", port=8001)
        EOF
        fi
        python embedding_server.py
