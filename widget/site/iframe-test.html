<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe Widget Test</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: #f3f4f6;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      color: #0d9488;
      font-size: 1.5rem;
      margin-bottom: 16px;
    }

    p {
      color: #4b5563;
      margin-bottom: 16px;
    }

    code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>iframe Widget Test</h1>
    <p>This page tests the iframe embedding method. The widget should appear in the bottom-right corner inside an iframe.</p>
    <p>Server: <code>http://localhost:8081</code></p>
    <p>Tenant: <code>test-tenant</code></p>
  </div>

  <!-- iframe Widget -->
  <iframe
    src="http://localhost:8081/widget/test-tenant/iframe?color=%230d9488&welcome=Hello%21%20How%20can%20we%20help%3F"
    style="position:fixed;bottom:20px;right:20px;width:380px;height:550px;border:none;z-index:9999;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.15);"
    title="Chat Widget"
  ></iframe>
</body>
</html>
